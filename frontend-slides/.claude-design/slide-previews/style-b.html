<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Preview B: Electric Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-white: #ffffff;
            --accent-blue: #4361ee;
            --text-dark: #0a0a0a;
            --text-light: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .slide {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .panel-top {
            flex: 1;
            background-color: var(--bg-white);
            color: var(--text-dark);
            padding: clamp(2rem, 8vw, 6rem);
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        .panel-bottom {
            height: 35vh;
            background-color: var(--accent-blue);
            color: var(--text-light);
            padding: clamp(2rem, 8vw, 6rem);
            display: flex;
            align-items: flex-start;
        }

        h1 {
            font-size: clamp(3rem, 12vh, 6rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            transform: translateY(20%);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tagline {
            font-size: clamp(1.2rem, 4vh, 2rem);
            font-weight: 400;
            opacity: 0;
            animation: fadeIn 0.8s 0.4s ease-out forwards;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: var(--accent-blue);
            transform: scaleX(0);
            transform-origin: left;
            animation: grow 0.6s 0.2s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(20%); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes grow {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="panel-top">
            <div class="accent-bar"></div>
            <h1>Personal<br>Alert +</h1>
        </div>
        <div class="panel-bottom">
            <p class="tagline">The future of senior emergency response.</p>
        </div>
    </div>
</body>
</html>
