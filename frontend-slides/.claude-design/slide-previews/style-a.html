<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Preview A: Bold Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            --card-bg: #FF5722;
            --text-primary: #ffffff;
            --text-on-card: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            padding: clamp(2rem, 5vw, 4rem);
            position: relative;
        }

        .card {
            grid-column: 2 / span 6;
            background: var(--card-bg);
            color: var(--text-on-card);
            padding: clamp(2rem, 4vw, 3rem);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            aspect-ratio: 4 / 3;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .number {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 8vh, 4rem);
            opacity: 0.2;
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2.5rem, 10vh, 5rem);
            line-height: 0.9;
            text-transform: uppercase;
        }

        .tagline {
            grid-column: 8 / span 4;
            align-self: center;
            font-size: clamp(1.2rem, 3vh, 1.8rem);
            font-weight: 500;
            opacity: 0;
            animation: fadeIn 0.8s 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="card">
            <div class="number">01</div>
            <h1>Personal Alert +</h1>
        </div>
        <p class="tagline">Smart Emergency Response for Seniors. Confident. Reliable. Modern.</p>
    </div>
</body>
</html>
